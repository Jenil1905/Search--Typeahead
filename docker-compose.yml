version: '3.8'

services:
  # PostgreSQL Database Container
  postgres:
    image: postgres:15-alpine
    container_name: typeahead_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: typeahead_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d typeahead_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Distributed Cache Container (Simulating 3 clusters in-memory)
  redis:
    image: redis:7-alpine
    container_name: typeahead_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot Java REST Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: typeahead_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: typeahead_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # React Frontend served by Nginx (Reverse Proxies /api queries to backend)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: typeahead_frontend
    restart: always
    ports:
      - "8081:80"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  postgres_data:
